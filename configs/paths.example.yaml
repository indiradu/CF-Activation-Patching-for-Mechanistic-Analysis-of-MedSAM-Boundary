  cf_seg_causal_gen: /path/to/checkpoints/cf_seg/causal-gen
  cf_seg_unet: /path/to/checkpoints/cf_seg/chexmask-seg
  sam_med2d: /path/to/checkpoints/sam_med2d

outputs:
  counterfactuals: /path/to/outputs/counterfactuals
  medsam_masks: /path/to/outputs/medsam_masks
  activations: /path/to/outputs/activations
  patching_runs: /path/to/outputs/patching_runs
  figures: /path/to/outputs/figures
